<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Kesalahan Internal</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome 6.5 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="error-page">
        <div style="position: relative; z-index: 1;">
            <div style="font-size: 80px; margin-bottom: 10px; opacity: 0.2;">
                <i class="fas fa-triangle-exclamation"></i>
            </div>
            <div class="error-code">500</div>
            <div class="error-message">Terjadi Kesalahan Internal</div>
            <p style="opacity: 0.7; font-size: 14px; max-width: 400px; margin: 0 auto 30px;">
                Maaf, terjadi kesalahan pada server. Silakan coba beberapa saat lagi atau hubungi administrator.
            </p>
            <a href="/dashboard" class="btn-back">
                <i class="fas fa-home me-2"></i>Kembali ke Dashboard
            </a>
        </div>

        <!-- Decorative Elements -->
        <div style="position: absolute; top: 15%; right: 10%; width: 25px; height: 25px; background: rgba(255,255,255,0.1); border-radius: 50%; animation: floatBubble 6s ease-in-out infinite;"></div>
        <div style="position: absolute; top: 50%; left: 10%; width: 35px; height: 35px; background: rgba(255,255,255,0.08); border-radius: 50%; animation: floatBubble 9s ease-in-out infinite 1s;"></div>
        <div style="position: absolute; bottom: 15%; right: 25%; width: 18px; height: 18px; background: rgba(255,255,255,0.06); border-radius: 50%; animation: floatBubble 7s ease-in-out infinite 3s;"></div>
    </div>
</body>
</html>
